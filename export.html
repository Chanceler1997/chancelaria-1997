<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Exportar planilha · Chancelaria 1997</title>
<style>
:root{--azul:#152541;--ouro:#c9a84c;--papel:#fffdf8;--texto:#171717}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Arial,"Segoe UI",sans-serif;background:linear-gradient(180deg,#0a1424,#152541);color:var(--texto)}
main{max-width:760px;margin:0 auto;padding:18px 12px}.panel{background:#f7f1e6;border:1px solid rgba(201,168,76,.55);border-radius:18px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.35)}
.header{background:#fff;border-bottom:2px solid var(--ouro)}.header img{display:block;width:100%;height:auto}.body{padding:20px;text-align:center}.body h1{font-family:Georgia,serif;color:var(--azul);font-size:24px;margin:0 0 8px}.body p{color:#665e52;line-height:1.45;margin:0 0 16px}
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;border:0;border-radius:11px;padding:12px 16px;font-weight:900;font-size:15px;text-decoration:none;cursor:pointer}.primary{background:var(--ouro);color:var(--azul)}.secondary{background:#fff;color:var(--azul);border:1px solid #ddd}.status{margin-top:14px;font-size:12px;color:#746b5c}.error{color:#9b2f29;font-weight:700}
</style>
</head>
<body>
<main><section class="panel"><div class="header"><img src="cabecalho-oficial.jpg" alt="Cabeçalho oficial da A.R.L.S. Razão e Força nº 1997"></div><div class="body"><h1>Planilha pronta</h1><p id="description">Toque no botão abaixo para salvar o arquivo CSV. O Excel, Google Planilhas e LibreOffice abrem este formato.</p><div class="actions"><a id="download" class="btn primary" href="#">Baixar planilha</a><button class="btn secondary" onclick="fecharPagina()">Fechar esta página</button></div><div id="status" class="status"></div></div></section></main>
<script>
(function(){
  const link=document.getElementById('download'),status=document.getElementById('status'),description=document.getElementById('description');
  function decodeBase64UrlUtf8(raw){raw=raw.replace(/-/g,'+').replace(/_/g,'/');while(raw.length%4)raw+='=';const bin=atob(raw),bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));return new TextDecoder().decode(bytes)}
  window.fecharPagina=function(){window.close();setTimeout(()=>{status.textContent='Use o botão Voltar do celular para retornar ao aplicativo.'},250)};
  try{
    const raw=location.hash.slice(1);if(!raw)throw new Error('Dados da planilha não recebidos.');
    const data=JSON.parse(decodeBase64UrlUtf8(raw));history.replaceState(null,'',location.pathname);
    const nome=String(data.nome||'relatorio.csv').replace(/[\/:*?"<>|]+/g,'_');
    const blob=new Blob([String(data.csv||'')],{type:'text/csv;charset=utf-8'}),url=URL.createObjectURL(blob);
    link.href=url;link.download=nome;description.textContent=`Arquivo: ${nome}`;status.textContent='Toque em Baixar planilha para iniciar o download.';
    window.addEventListener('pagehide',()=>URL.revokeObjectURL(url),{once:true});
  }catch(e){link.style.display='none';description.textContent='Não foi possível gerar a planilha.';status.className='status error';status.textContent=String(e.message||e)}
})();
</script>
</body>
</html>
