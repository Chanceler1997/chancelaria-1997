<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Relatório · Chancelaria 1997</title>
<style>
:root{--azul:#152541;--ouro:#c9a84c;--texto:#171717}
*{box-sizing:border-box}
html,body{margin:0;background:#e9e9e9;color:var(--texto);font-family:Arial,"Segoe UI",sans-serif}
.toolbar{position:sticky;top:0;z-index:5;display:flex;gap:10px;justify-content:center;padding:12px;background:var(--azul);box-shadow:0 3px 12px rgba(0,0,0,.25)}
.toolbar button{border:0;border-radius:10px;padding:12px 16px;font-size:15px;font-weight:800;cursor:pointer}
.primary{background:var(--ouro);color:var(--azul)}.secondary{background:#fff;color:var(--azul)}
.page{width:210mm;min-height:297mm;margin:14px auto;background:#fff;padding:12mm;box-shadow:0 4px 22px rgba(0,0,0,.18)}
.official-header{margin-bottom:7mm;border:1.5px solid var(--ouro);border-radius:10px;overflow:hidden;background:#fff;break-inside:avoid;page-break-inside:avoid}
.official-header img{display:block;width:100%;height:auto}
h2{font-size:13pt;margin:0 0 5mm;text-align:center;text-transform:uppercase;color:var(--azul);break-after:avoid-page;page-break-after:avoid}
p{font-size:10pt;line-height:1.45;margin:2mm 0;orphans:3;widows:3}
table{width:100%;border-collapse:collapse;font-size:8.5pt;line-height:1.25;margin-top:3mm;table-layout:fixed}
thead{display:table-header-group}
tfoot{display:table-footer-group}
tr{break-inside:avoid;page-break-inside:avoid}
th,td{border:1px solid #aaa;padding:1.8mm;text-align:left;vertical-align:top;overflow-wrap:anywhere;word-break:normal}
th{background:#ece8df;color:var(--azul);font-weight:800}
.collective-table th:nth-child(1){width:23%}.collective-table th:nth-child(2){width:16%}.collective-table th:nth-child(3){width:9%}.collective-table th:nth-child(4){width:15%}.collective-table th:nth-child(5){width:17%}.collective-table th:nth-child(6){width:12%}.collective-table th:nth-child(7){width:8%}
.individual-table th:nth-child(1){width:23%}.individual-table th:nth-child(2){width:25%}.individual-table th:nth-child(3){width:24%}.individual-table th:nth-child(4){width:28%}
.continued-table{margin-top:0}
.assinatura{margin-top:12mm;text-align:center;font-size:10pt;break-inside:avoid;page-break-inside:avoid}
.footer{position:static;margin-top:6mm;border-top:1px solid #999;padding-top:1.5mm;font-size:7pt;line-height:1.25;text-align:justify;color:#333;break-inside:avoid;page-break-inside:avoid}
.error{max-width:680px;margin:30px auto;background:#fff;padding:24px;border-radius:12px;border:1px solid #b13b33}
@page{size:A4 portrait;margin:12mm}
@media(max-width:800px){.page{width:100%;min-height:0;margin:0;box-shadow:none;padding:14px 12px 90px}.footer{margin-top:28px}.toolbar{position:relative}}
@media print{
  html,body{background:#fff;width:100%}
  .toolbar{display:none!important}
  .page{width:auto;min-height:0;margin:0;box-shadow:none;padding:0}
  .official-header{margin-bottom:6mm}
  .continued-table{break-before:page;page-break-before:always;margin-top:0}
  h2{font-size:12.5pt;margin-bottom:4mm}
  p{font-size:9.4pt;line-height:1.35}
  table{font-size:8.5pt;margin-top:2.5mm}
  th,td{padding:1.75mm}
  .assinatura{margin-top:5mm}
  .footer{position:static;margin-top:3mm}
}
</style>
</head>
<body>
<div class="toolbar">
  <button class="primary" onclick="window.print()">Imprimir ou salvar em PDF</button>
  <button class="secondary" onclick="voltarAoAplicativo()">Fechar e voltar</button>
</div>
<main id="app"></main>
<script>
(function(){
  const app=document.getElementById('app');
  function decodeBase64UrlUtf8(raw){raw=raw.replace(/-/g,'+').replace(/_/g,'/');while(raw.length%4)raw+='=';const bin=atob(raw),bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));return new TextDecoder().decode(bytes)}
  window.voltarAoAplicativo=function(){try{window.close()}catch(e){}setTimeout(()=>{if(history.length>1)history.back()},120)};
  try{
    const raw=location.hash.slice(1);if(!raw)throw new Error('Relatório não recebido.');
    const data=JSON.parse(decodeBase64UrlUtf8(raw));history.replaceState(null,'',location.pathname+location.search);document.title=(data.titulo||'Relatório')+' · Chancelaria 1997';
    app.innerHTML=`<article class="page"><header class="official-header"><img src="cabecalho-oficial.jpg" alt="Cabeçalho oficial da A.R.L.S. Razão e Força nº 1997"></header>${data.corpo||''}<div class="assinatura">____________________________________<br>Chancelaria</div><div class="footer">Art. 76 do Regulamento Geral da Federação: o Maçom ativo terá seus direitos suspensos quando deixar de frequentar sem justa causa 50% das sessões da Loja no período de doze meses.</div></article>`;
    const coletiva=app.querySelector('table.collective-table');
    if(coletiva&&coletiva.tBodies[0]){
      const linhas=[...coletiva.tBodies[0].rows];
      const limite=20;
      if(linhas.length>limite){
        linhas.slice(limite).forEach(l=>l.remove());
        let referencia=coletiva;
        for(let inicio=limite;inicio<linhas.length;inicio+=limite){
          const nova=coletiva.cloneNode(false);
          nova.className=coletiva.className+' continued-table';
          if(coletiva.tHead)nova.appendChild(coletiva.tHead.cloneNode(true));
          const corpo=document.createElement('tbody');
          linhas.slice(inicio,inicio+limite).forEach(l=>corpo.appendChild(l));
          nova.appendChild(corpo);
          referencia.after(nova);
          referencia=nova;
        }
      }
    }
    const deveImprimir=new URLSearchParams(location.search).get('print')==='1';if(deveImprimir){const img=app.querySelector('img');const imprimir=()=>setTimeout(()=>{try{window.print()}catch(e){}},700);if(img&&!img.complete)img.addEventListener('load',imprimir,{once:true});else imprimir()}
  }catch(e){app.innerHTML=`<div class="error"><h2>Não foi possível abrir o relatório</h2><p>${String(e.message||e)}</p><p>Volte ao aplicativo e gere o relatório novamente.</p></div>`}
})();
</script>
</body>
</html>
